<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYST — Get Your Shit Together</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#fafcfe; --surface2:#f0f4f8; --surface3:#e4ecf4;
  --border:#d4e0ec; --border2:#c2d4e6;
  --text:#1e2d3d; --text-mid:#4a6480; --text-muted:#7a96b0; --text-dim:#a8bece;
  --accent:#4a80b0; --accent-lt:#dceaf5;
  --red:#d94f4f; --red-bg:#fdf0f0; --red-bd:#f0c8c8;
  --active:#4a80b0; --active-bg:#dceaf5; --active-bd:#b0cfe8;
  --todo:#6e9ec0; --todo-bg:#e6f1f8; --todo-bd:#c0d8ea;
  --errands:#7b9e87; --errands-bg:#eef5f0; --errands-bd:#b8d4c0;
  --someday:#92bcd0; --someday-bg:#eef5f9; --someday-bd:#cce0ec;
  --onhold:#6a7e92; --onhold-bg:#f0f4f8; --onhold-bd:#c8d6e2;
  --waiting:#8a9aaa; --waiting-bg:#f4f6f8; --waiting-bd:#d0d8e0;
  --sh-sm:0 1px 3px rgba(74,128,176,.08),0 1px 2px rgba(30,45,61,.04);
  --sh-md:0 4px 12px rgba(74,128,176,.10),0 2px 4px rgba(30,45,61,.06);
  --sh-lg:0 8px 28px rgba(74,128,176,.14),0 4px 8px rgba(30,45,61,.08);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:400;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(74,128,176,.07) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 90% 100%,rgba(74,128,176,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1360px;margin:0 auto;padding:0 28px 80px}

/* HEADER */
header{padding:28px 0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);margin-bottom:28px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:baseline;gap:14px}
.logo-word{font-size:32px;font-weight:800;letter-spacing:-1.5px;color:var(--accent);line-height:1}
.logo-word span{color:var(--text)}
.logo-tagline{font-style:italic;font-weight:300;font-size:13px;color:var(--text-muted)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.kbd-hint{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);margin-right:4px}
kbd{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-family:'Jost',sans-serif;font-size:10px;font-weight:600;color:var(--text-muted)}
.btn{border:none;padding:10px 20px;border-radius:10px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s ease;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(74,128,176,.3)}
.btn-primary:hover{background:#3a6fa0;transform:translateY(-1px)}
.btn-secondary{background:var(--surface);color:var(--text-mid);border:1.5px solid var(--border);box-shadow:var(--sh-sm)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
.btn-gyst{background:linear-gradient(135deg,#4a80b0,#6e9ec0);color:#fff;box-shadow:0 2px 12px rgba(74,128,176,.4);font-weight:700}
.btn-gyst:hover{background:linear-gradient(135deg,#3a6fa0,#5a8eb0);transform:translateY(-1px)}
.btn-placeholder{opacity:.6;border-style:dashed !important}
.btn-capture{background:var(--surface);color:var(--text-mid);border:1.5px solid var(--border);box-shadow:var(--sh-sm);position:relative;gap:8px}
.btn-capture:hover{border-color:var(--todo);color:var(--todo);background:var(--todo-bg)}
.capture-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:100px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;line-height:1}
.btn-icon{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;box-shadow:var(--sh-sm)}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}

/* STATS */
.stats-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--border);border-radius:100px;padding:5px 14px 5px 9px;font-size:12px;font-weight:500;color:var(--text-muted);box-shadow:var(--sh-sm)}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-count{font-weight:700;font-size:13px;color:var(--text);margin-left:2px}

/* LAYOUT */
.main-layout{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}

/* SIDEBAR */
.sidebar{position:sticky;top:24px;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:16px 12px;box-shadow:var(--sh-sm)}
.sb-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding-left:10px;margin-bottom:0}
.sb-section>.sb-label{margin-bottom:6px}
.sb-label-row{display:flex;align-items:center;justify-content:space-between;padding-left:8px;margin-bottom:6px}
.sb-section{margin-bottom:20px}
.sb-section:last-child{margin-bottom:0}
.sb-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;border-radius:9px;border:none;background:transparent;color:var(--text-mid);font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease;margin-bottom:1px;text-align:left}
.sb-btn:hover{background:var(--surface2);color:var(--text)}
.sb-btn.active{background:var(--accent-lt);color:var(--accent);font-weight:600}
.sb-btn-inner{display:flex;align-items:center;gap:7px;min-width:0}
.sb-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-count{font-size:11px;font-weight:700;color:var(--text-dim);background:var(--surface2);border-radius:100px;padding:1px 7px;flex-shrink:0}
.sb-btn.active .sb-count{background:rgba(74,128,176,.15);color:var(--accent)}
.sb-add-icon{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:transparent;color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;padding:0;line-height:1}
.sb-add-icon:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
.done-dot{width:7px;height:7px;border-radius:50%;background:var(--someday);flex-shrink:0}

/* SEARCH */
.search-bar{position:relative;margin-bottom:20px}
.search-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:10px 16px 10px 40px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:all .15s ease;box-shadow:var(--sh-sm)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,128,176,.1)}
.search-input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:15px;pointer-events:none}

/* STATUS GROUPS */
.status-groups{display:flex;flex-direction:column;gap:16px}
.status-group{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm);transition:box-shadow .2s}
.status-group:hover{box-shadow:var(--sh-md)}
.sg-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none;border-left:4px solid transparent}
.sg-left{display:flex;align-items:center;gap:10px}
.sg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sg-name{font-size:14px;font-weight:700}
.sg-desc{font-size:12px;color:var(--text-muted)}
.sg-right{display:flex;align-items:center;gap:10px}
.sg-badge{font-size:12px;font-weight:700;padding:2px 10px;border-radius:100px;border:1.5px solid}
.sg-toggle{font-size:10px;color:var(--text-dim);transition:transform .2s}
.sg-toggle.collapsed{transform:rotate(-90deg)}
.sg-body{border-top:1.5px solid var(--border)}
.sg-body.hidden{display:none}
.s-timesensitive .sg-header{border-left-color:var(--red);background:var(--red-bg)}.s-timesensitive .sg-dot{background:var(--red)}.s-timesensitive .sg-name{color:var(--red)}.s-timesensitive .sg-badge{color:var(--red);border-color:var(--red-bd);background:var(--red-bg)}
.s-active .sg-header{border-left-color:var(--active);background:var(--active-bg)}.s-active .sg-dot{background:var(--active)}.s-active .sg-name{color:var(--active)}.s-active .sg-badge{color:var(--active);border-color:var(--active-bd);background:var(--active-bg)}
.s-todo .sg-header{border-left-color:var(--todo);background:var(--todo-bg)}.s-todo .sg-dot{background:var(--todo)}.s-todo .sg-name{color:var(--todo)}.s-todo .sg-badge{color:var(--todo);border-color:var(--todo-bd);background:var(--todo-bg)}
.s-errands .sg-header{border-left-color:var(--errands);background:var(--errands-bg)}.s-errands .sg-dot{background:var(--errands)}.s-errands .sg-name{color:var(--errands)}.s-errands .sg-badge{color:var(--errands);border-color:var(--errands-bd);background:var(--errands-bg)}
.s-someday .sg-header{border-left-color:var(--someday);background:var(--someday-bg)}.s-someday .sg-dot{background:var(--someday)}.s-someday .sg-name{color:var(--someday)}.s-someday .sg-badge{color:var(--someday);border-color:var(--someday-bd);background:var(--someday-bg)}
.s-onhold .sg-header{border-left-color:var(--onhold);background:var(--onhold-bg)}.s-onhold .sg-dot{background:var(--onhold)}.s-onhold .sg-name{color:var(--onhold)}.s-onhold .sg-badge{color:var(--onhold);border-color:var(--onhold-bd);background:var(--onhold-bg)}
.s-waiting .sg-header{border-left-color:var(--waiting);background:var(--waiting-bg)}.s-waiting .sg-dot{background:var(--waiting)}.s-waiting .sg-name{color:var(--waiting)}.s-waiting .sg-badge{color:var(--waiting);border-color:var(--waiting-bd);background:var(--waiting-bg)}

/* ACTION CARDS */
.action-card{display:flex;align-items:flex-start;gap:13px;padding:13px 18px;border-bottom:1px solid var(--border);transition:background .12s;animation:fadeUp .2s ease}
.action-card:last-child{border-bottom:none}
.action-card:hover{background:var(--surface2)}
.action-card.is-done{opacity:.42}
.action-card.is-done .ac-title{text-decoration:line-through;color:var(--text-muted)}
.ac-check{width:19px;height:19px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.ac-check:hover{border-color:var(--accent);background:var(--accent-lt)}
.ac-check.chk{background:var(--accent);border-color:var(--accent)}
.ac-check.chk::after{content:'checkmark';font-size:0;width:10px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:block}
.ac-body{flex:1;min-width:0}
.ac-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4}
.ac-notes{font-size:12.5px;font-style:italic;color:var(--text-muted);margin-bottom:5px;line-height:1.4}
.ac-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.proj-tag{font-size:11px;font-weight:600;padding:2px 9px;border-radius:100px;background:var(--accent-lt);color:var(--accent);border:1px solid rgba(74,128,176,.2)}
.next-tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 7px;border-radius:100px;background:var(--active-bg);color:var(--active);border:1px solid var(--active-bd)}
.ac-date{font-size:11px;color:var(--text-dim)}
.ac-date.soon{color:var(--red);font-weight:600}
.badge-esc{font-size:10px;font-weight:600;color:var(--red);margin-left:8px;background:var(--red-bg);border:1px solid var(--red-bd);padding:1px 7px;border-radius:100px}
.ac-body-click{cursor:pointer}
.ac-body-click:hover .ac-title{color:var(--accent)}
.ac-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.action-card:hover .ac-actions{opacity:1}
.ic-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ic-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.ic-btn.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}

/* PROJECT CARDS */
.projects-grid{display:flex;flex-direction:column;gap:16px}
.proj-section{margin-bottom:28px}
.proj-section:last-child{margin-bottom:0}
.proj-section-header{display:flex;align-items:center;gap:10px;padding:6px 0 10px;border-bottom:1.5px solid var(--border);margin-bottom:12px}
.proj-section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.proj-section-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.proj-section-count{font-size:11px;color:var(--text-dim)}
.proj-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm);transition:box-shadow .2s;animation:fadeUp .2s ease}
.proj-card:hover{box-shadow:var(--sh-md)}
.proj-card.completed{opacity:.55}
.proj-card-header{display:flex;align-items:center;gap:14px;padding:16px 18px;border-left:4px solid var(--accent)}
.expand-btn{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.expand-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.proj-next{font-size:13px;color:var(--text-mid);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.next-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--active);background:var(--active-bg);border:1px solid var(--active-bd);padding:2px 8px;border-radius:100px;flex-shrink:0}
.next-lbl.urgent{color:var(--red);background:var(--red-bg);border-color:var(--red-bd)}
.proj-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
.proj-due-badge{font-size:11px;padding:2px 9px;border-radius:100px;border:1px solid;font-weight:500}
.proj-due-badge.ok{color:var(--text-muted);border-color:var(--border);background:var(--surface2)}
.proj-due-badge.soon{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);font-weight:600}
.prog-wrap{width:72px;height:5px;background:var(--surface3);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;background:var(--accent);transition:width .3s}
.prog-text{font-size:11px;color:var(--text-dim);font-weight:500;white-space:nowrap}

/* STEP ROWS */
.steps-panel{border-top:1.5px solid var(--border);display:none}
.steps-panel.open{display:block}
.step-row{display:flex;align-items:flex-start;gap:12px;padding:11px 18px 11px 20px;border-bottom:1px solid var(--border);transition:background .12s;animation:fadeUp .15s ease}
.step-row:last-child{border-bottom:none}
.step-row:hover{background:var(--surface2)}
.step-row.is-next{background:rgba(74,128,176,.03)}
.step-row.done-step{opacity:.42}
.step-row.done-step .step-title{text-decoration:line-through;color:var(--text-muted)}
.step-row.on-hold-step{opacity:.55}
.step-num{font-size:11px;font-weight:700;color:var(--text-dim);min-width:18px;margin-top:2px;flex-shrink:0}
.step-row.is-next .step-num{color:var(--active)}
.step-chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.step-chk:hover{border-color:var(--accent);background:var(--accent-lt)}
.step-chk.chk{background:var(--accent);border-color:var(--accent)}
.step-chk.chk::after{content:'checkmark';font-size:0;width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:block}
.step-body{flex:1;min-width:0}
.step-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.step-row.is-next .step-title{font-weight:600}
.step-badges{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}
.sbadge{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:1px 7px;border-radius:100px;border:1px solid}
.sbadge.next{color:var(--active);background:var(--active-bg);border-color:var(--active-bd)}
.sbadge.todo{color:var(--todo);background:var(--todo-bg);border-color:var(--todo-bd)}
.sbadge.urgent{color:var(--red);background:var(--red-bg);border-color:var(--red-bd)}
.sbadge.hold{color:var(--onhold);background:var(--onhold-bg);border-color:var(--onhold-bd)}
.step-due{font-size:11px;color:var(--text-dim)}
.step-due.soon{color:var(--red);font-weight:600}
.step-acts{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.step-row:hover .step-acts{opacity:1}
.step-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.step-btn:hover{background:var(--surface3);color:var(--text)}
.step-btn.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.add-step-row{display:flex;align-items:center;gap:10px;padding:10px 18px 10px 50px;border-top:1px dashed var(--border)}
.add-step-input{flex:1;background:transparent;border:none;outline:none;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);padding:4px 0}
.add-step-input::placeholder{color:var(--text-dim)}
.add-step-go{padding:4px 12px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.add-step-go:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}

/* EMPTY */
.empty-state{padding:30px;text-align:center;color:var(--text-dim);font-size:13px;font-style:italic}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(30,45,61,.35);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:30px;width:100%;max-width:520px;box-shadow:var(--sh-lg);transform:translateY(14px) scale(.98);transition:transform .22s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal h2{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.3px}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;font-style:italic}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px}
.fl-opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-dim)}
.fi,.fsel,.fta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:all .15s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,128,176,.1);background:var(--surface)}
.fta{resize:vertical;min-height:70px;line-height:1.5}
.fdiv{height:1px;background:var(--border);margin:18px 0}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.btn-cancel{padding:10px 18px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Jost',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-save{padding:10px 24px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Jost',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(74,128,176,.3)}
.btn-save:hover{background:#3a6fa0}

/* STATUS PICKER */
.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.so{padding:8px 6px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;text-align:center;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;color:var(--text-muted);transition:all .15s;line-height:1.3}
.so:hover{border-color:var(--border2);color:var(--text)}
.so[data-s="timesensitive"].sel{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.so[data-s="active"].sel{border-color:var(--active);background:var(--active-bg);color:var(--active);font-weight:700}
.so[data-s="todo"].sel{border-color:var(--todo);background:var(--todo-bg);color:var(--todo);font-weight:700}
.so[data-s="errands"].sel{border-color:var(--errands);background:var(--errands-bg);color:var(--errands);font-weight:700}
.so[data-s="someday"].sel{border-color:var(--someday);background:var(--someday-bg);color:var(--someday);font-weight:700}
.so[data-s="onhold"].sel{border-color:var(--onhold);background:var(--onhold-bg);color:var(--onhold);font-weight:700}
.so[data-s="waiting"].sel{border-color:var(--waiting);background:var(--waiting-bg);color:var(--waiting);font-weight:700}

/* PROJ/STEP STATUS PICKER */
.pso-row{display:flex;gap:8px;flex-wrap:wrap}
.pso{padding:8px 14px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .15s}
.pso:hover{border-color:var(--border2);color:var(--text)}
.pso[data-ps="active"].sel,.pso[data-ss="auto"].sel{border-color:var(--active);background:var(--active-bg);color:var(--active);font-weight:700}
.pso[data-ps="someday"].sel{border-color:var(--someday);background:var(--someday-bg);color:var(--someday);font-weight:700}
.pso[data-ps="onhold"].sel,.pso[data-ss="onhold"].sel{border-color:var(--onhold);background:var(--onhold-bg);color:var(--onhold);font-weight:700}

/* STEP BUILDER */
.step-builder{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.step-builder-row{display:flex;align-items:center;gap:8px;animation:fadeUp .15s ease}
.step-builder-num{font-size:12px;font-weight:700;color:var(--text-dim);min-width:20px;flex-shrink:0}
.step-builder-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:all .15s}
.step-builder-input:focus{border-color:var(--accent);background:var(--surface)}
.step-builder-input::placeholder{color:var(--text-dim)}
.step-rm{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.step-rm:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.add-step-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;border:none;background:transparent;font-family:'Jost',sans-serif;transition:opacity .15s}
.add-step-link:hover{opacity:.7}

/* TAG PICKER */
.tag-picker{display:flex;flex-wrap:wrap;gap:6px;min-height:36px;padding:6px 8px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;margin-bottom:6px;transition:border-color .15s}
.tag-picker:focus-within{border-color:var(--accent)}
.tag-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;user-select:none}
.tag-chip.lbl{background:var(--surface2);color:var(--text-muted);border-color:var(--border)}
.tag-chip.lbl.sel{background:var(--accent-lt);color:var(--accent);border-color:var(--active-bd)}
.tag-chip.loc{background:var(--surface2);color:var(--text-muted);border-color:var(--border)}
.tag-chip.loc.sel{background:var(--errands-bg);color:var(--errands);border-color:var(--errands-bd)}
.tag-empty{font-size:12px;color:var(--text-dim);font-style:italic;padding:2px 4px}
.quick-add-row{display:flex;gap:8px;align-items:center}
.quick-add-input{flex:1;padding:7px 12px;font-size:13px}
.quick-add-btn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.quick-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}

/* SETTINGS LIST */
.settings-list{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--surface2);border-radius:8px;font-size:13px;color:var(--text)}
.settings-rm{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.settings-rm:hover{background:var(--red-bg);color:var(--red)}
.settings-empty{font-size:12px;color:var(--text-dim);font-style:italic;padding:6px 4px}

/* COMPLETION MODAL */
.comp-modal .modal{max-width:380px;text-align:center}
.comp-modal h2{font-size:26px}
.comp-sub{color:var(--text-muted);font-size:14px;margin-bottom:28px}
.comp-choices{display:flex;flex-direction:column;gap:10px}
.comp-btn{padding:14px 18px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Jost',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-align:left}
.comp-btn:hover{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.comp-btn small{display:block;font-size:12px;font-weight:400;color:var(--text-muted);margin-top:3px}
.comp-btn:hover small{color:var(--active)}

/* GYST FLOW */
.gyst-modal .modal{max-width:580px}
.gyst-progress{display:flex;align-items:center;gap:8px;margin-bottom:22px}
.gyst-bar{flex:1;height:4px;background:var(--surface3);border-radius:100px;overflow:hidden}
.gyst-bar-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .3s}
.gyst-bar-text{font-size:12px;color:var(--text-muted);white-space:nowrap;font-weight:500}
.gyst-item{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.2px;line-height:1.3}
.gyst-item-sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;font-style:italic}
.gyst-choices{display:flex;flex-direction:column;gap:10px}
.gyst-choice{padding:14px 18px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Jost',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px}
.gyst-choice:hover{border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.gyst-choice-icon{font-size:20px;flex-shrink:0}
.gyst-choice small{display:block;font-size:12px;font-weight:400;color:var(--text-muted);margin-top:2px}
.gyst-choice:hover small{color:var(--active)}
.gyst-skip{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;margin-top:8px;width:100%;text-align:center}
.gyst-skip:hover{color:var(--text-muted);border-color:var(--border2)}
.gyst-inbox-notice{display:flex;align-items:center;gap:8px;background:var(--active-bg);border:1.5px solid var(--active-bd);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--text-mid)}
.gyst-inbox-notice strong{color:var(--active)}
.gyst-done h3{font-size:22px;font-weight:800;margin-bottom:8px}
.gyst-done p{color:var(--text-muted);font-size:14px;margin-bottom:24px}

/* COLLAPSIBLE SIDEBAR */
.sb-collapsible-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;user-select:none}
.sb-collapsible-left{display:flex;align-items:center;gap:6px}
.sb-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;flex-shrink:0}
.sb-chevron.collapsed{transform:rotate(-90deg)}
.sb-collapsible-body.hidden{display:none}
/* SIDEBAR LABEL FILTER */
.sb-label-chips{display:flex;flex-direction:column;gap:2px}
.sb-label-chip{display:flex;align-items:center;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:'Jost',sans-serif;justify-content:flex-start}
.sb-label-chip:hover{background:var(--surface2);color:var(--text)}
.sb-label-chip.sel{background:var(--accent-lt);color:var(--accent);font-weight:600}
.sb-label-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:8px;flex-shrink:0;opacity:0}
.sb-label-chip.sel .sb-label-dot{opacity:1}
.sb-filter-clear{display:none;width:100%;padding:5px 10px;border-radius:8px;border:1.5px dashed var(--active-bd);background:transparent;color:var(--active);font-family:'Jost',sans-serif;font-size:11px;font-weight:600;cursor:pointer;margin-top:4px;transition:all .15s;text-align:center}
.sb-filter-clear:hover{background:var(--active-bg)}
.sb-filter-clear.show{display:block}
/* FLOWS BAR */
.flows-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.flow-bar-btn{padding:9px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-mid);font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;box-shadow:var(--sh-sm);white-space:nowrap}
.flow-bar-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
.flow-bar-btn.placeholder{opacity:.6;border-style:dashed}
.flow-bar-gyst{background:linear-gradient(135deg,#4a80b0,#6e9ec0) !important;color:#fff !important;border-color:transparent !important;box-shadow:0 2px 10px rgba(74,128,176,.35) !important}
.flow-bar-gyst:hover{background:linear-gradient(135deg,#3a6fa0,#5a8eb0) !important;transform:translateY(-1px)}

@media(max-width:780px){
  .main-layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .logo-tagline{display:none}
  .status-grid{grid-template-columns:repeat(2,1fr)}
  .header-right{gap:6px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-word">GY<span>ST</span></div>
      <div class="logo-tagline">Get Your Shit Together</div>
    </div>
    <div class="header-right">
      <div class="kbd-hint"><kbd>⌘</kbd><kbd>K</kbd></div>
      <button class="btn btn-capture" onclick="openCapture()" id="captureBtn">
        <span>⊕ Capture</span>
        <span class="capture-badge" id="captureBadge" style="display:none"></span>
      </button>
      <button class="btn btn-secondary" onclick="openAddTask()">+ New Task</button>
      <button class="btn btn-secondary" onclick="openAddProject()">+ New Project</button>
      <button class="btn-icon" onclick="openSettings()" title="Settings">⚙</button>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">

      <!-- VIEWS -->
      <div class="sb-section">
        <div class="sb-label">Views</div>
        <button class="sb-btn active" id="vb-all" onclick="setView('all',this)">
          <div class="sb-btn-inner"><span class="sb-name">Tasks</span></div>
          <span class="sb-count" id="cnt-all"></span>
        </button>
        <button class="sb-btn" id="vb-projects" onclick="setView('projects',this)">
          <div class="sb-btn-inner"><span class="sb-name">Projects</span></div>
          <span class="sb-count" id="cnt-projects"></span>
        </button>
        <button class="sb-btn" id="vb-errands" onclick="setView('errands',this)">
          <div class="sb-btn-inner"><span class="sb-name">Errands</span></div>
          <span class="sb-count" id="cnt-errands"></span>
        </button>
      </div>

      <!-- PROJECTS (collapsible) -->
      <div class="sb-section">
        <div class="sb-collapsible-header" onclick="toggleSBSection('projSection','projChevron')">
          <div class="sb-collapsible-left">
            <span class="sb-label">Projects</span>
            <span class="sb-chevron" id="projChevron">▼</span>
          </div>
          <button class="sb-add-icon" onclick="event.stopPropagation();openAddProject()" title="New Project">+</button>
        </div>
        <div class="sb-collapsible-body" id="projSection">
          <div id="projectList"></div>
        </div>
      </div>

      <!-- LABELS FILTER (collapsible) -->
      <div class="sb-section">
        <div class="sb-collapsible-header" onclick="toggleSBSection('labelSection','labelChevron')">
          <div class="sb-collapsible-left">
            <span class="sb-label">Filter by Label</span>
            <span class="sb-chevron collapsed" id="labelChevron">▼</span>
          </div>
        </div>
        <div class="sb-collapsible-body hidden" id="labelSection">
          <div class="sb-label-chips" id="labelFilterList"></div>
          <button class="sb-filter-clear" id="labelFilterClear" onclick="clearLabelFilter()">Clear filter</button>
        </div>
      </div>

      <!-- LOCATION FILTER (collapsible) -->
      <div class="sb-section">
        <div class="sb-collapsible-header" onclick="toggleSBSection('locSection','locChevron')">
          <div class="sb-collapsible-left">
            <span class="sb-label">Filter by Location</span>
            <span class="sb-chevron collapsed" id="locChevron">▼</span>
          </div>
        </div>
        <div class="sb-collapsible-body hidden" id="locSection">
          <div class="sb-label-chips" id="locFilterList"></div>
          <button class="sb-filter-clear" id="locFilterClear" onclick="clearLocFilter()">Clear filter</button>
        </div>
      </div>

    </aside>

    <main>
      <!-- FLOWS BAR -->
      <div class="flows-bar">
        <button class="flow-bar-btn flow-bar-gyst" onclick="openGYST()">⚡ Get Your Shit Together</button>
        <button class="flow-bar-btn placeholder" onclick="alert('Start Work flow coming soon!')">▶ Start Work</button>
        <button class="flow-bar-btn placeholder" onclick="alert('End Work flow coming soon!')">■ End Work</button>
      </div>

      <div class="search-bar">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="Search tasks, projects, actions…" oninput="renderMain()" id="searchInput">
      </div>
      <div id="mainContent"></div>
    </main>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="taskModalTitle">New Task</h2>
    <div class="fg">
      <label class="fl">What needs doing?</label>
      <input class="fi" id="tTitle" type="text" placeholder="Task description…"/>
    </div>
    <div class="fg">
      <label class="fl">Notes <span class="fl-opt">(optional)</span></label>
      <textarea class="fta" id="tNotes" placeholder="Context, links, details…"></textarea>
    </div>
    <div class="fdiv"></div>
    <div class="fg">
      <label class="fl">Status</label>
      <div class="status-grid" id="statusGrid"></div>
    </div>
    <div class="fg">
      <label class="fl">Due Date <span class="fl-opt">(optional — within 48hrs auto-escalates)</span></label>
      <input class="fi" id="tDue" type="date"/>
    </div>
    <div class="fg">
      <label class="fl">Assign to Project? <span class="fl-opt">(optional — converts to a step)</span></label>
      <select class="fsel" id="tProjAssign"><option value="">— Keep as standalone task —</option></select>
    </div>
    <div class="fdiv"></div>
    <div class="fg">
      <label class="fl">Labels <span class="fl-opt">(optional — multiple)</span></label>
      <div class="tag-picker" id="tLabelPicker"></div>
      <div class="quick-add-row">
        <input class="fi quick-add-input" id="tNewLabel" type="text" placeholder="New label…" onkeydown="if(event.key==='Enter'){event.preventDefault();quickAdd('label','task')}"/>
        <button type="button" class="quick-add-btn" onclick="quickAdd('label','task')">Add</button>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Location <span class="fl-opt">(optional — context for where)</span></label>
      <div class="tag-picker" id="tLocPicker"></div>
      <div class="quick-add-row">
        <input class="fi quick-add-input" id="tNewLoc" type="text" placeholder="New location…" onkeydown="if(event.key==='Enter'){event.preventDefault();quickAdd('location','task')}"/>
        <button type="button" class="quick-add-btn" onclick="quickAdd('location','task')">Add</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('taskModal')">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h2 id="projModalTitle">New Project</h2>
    <div class="fg">
      <label class="fl">Project Name</label>
      <input class="fi" id="pName" type="text" placeholder="What are you working toward?"/>
    </div>
    <div class="fg">
      <label class="fl">Notes <span class="fl-opt">(optional)</span></label>
      <textarea class="fta" id="pNotes" placeholder="Goals, context, links…"></textarea>
    </div>
    <div class="fg">
      <label class="fl">Status</label>
      <div class="pso-row" id="projStatusRow">
        <button type="button" class="pso sel" data-ps="active" onclick="setPSel('projStatusRow','ps',this)">Active</button>
        <button type="button" class="pso" data-ps="someday" onclick="setPSel('projStatusRow','ps',this)">Someday / Maybe</button>
        <button type="button" class="pso" data-ps="onhold" onclick="setPSel('projStatusRow','ps',this)">On Hold</button>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Due Date <span class="fl-opt">(optional — applies to all steps)</span></label>
      <input class="fi" id="pDue" type="date"/>
    </div>
    <div class="fdiv"></div>
    <div class="fg">
      <label class="fl">Labels <span class="fl-opt">(optional — multiple)</span></label>
      <div class="tag-picker" id="pLabelPicker"></div>
      <div class="quick-add-row">
        <input class="fi quick-add-input" id="pNewLabel" type="text" placeholder="New label…" onkeydown="if(event.key==='Enter'){event.preventDefault();quickAdd('label','project')}"/>
        <button type="button" class="quick-add-btn" onclick="quickAdd('label','project')">Add</button>
      </div>
    </div>
    <div class="fdiv"></div>
    <div class="fg">
      <label class="fl">Action Steps <span class="fl-opt">(optional)</span></label>
      <div class="step-builder" id="stepBuilder"></div>
      <button type="button" class="add-step-link" onclick="addBuilderRow()">+ Add another step</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('projectModal')">Cancel</button>
      <button class="btn-save" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- STEP MODAL -->
<div class="modal-overlay" id="stepModal">
  <div class="modal">
    <h2>Edit Action Step</h2>
    <div class="fg">
      <label class="fl">Action</label>
      <input class="fi" id="sTitle" type="text"/>
    </div>
    <div class="fg">
      <label class="fl">Due Date <span class="fl-opt">(overrides project due date)</span></label>
      <input class="fi" id="sDue" type="date"/>
    </div>
    <div class="fg">
      <label class="fl">Status Override</label>
      <div class="pso-row" id="stepStatusRow">
        <button type="button" class="pso sel" data-ss="auto" onclick="setPSel('stepStatusRow','ss',this)">Auto (Next Action / To Do)</button>
        <button type="button" class="pso" data-ss="onhold" onclick="setPSel('stepStatusRow','ss',this)">On Hold</button>
      </div>
    </div>
    <div class="fdiv"></div>
    <div class="fg">
      <label class="fl">Location <span class="fl-opt">(optional)</span></label>
      <div class="tag-picker" id="sLocPicker"></div>
      <div class="quick-add-row">
        <input class="fi quick-add-input" id="sNewLoc" type="text" placeholder="New location…" onkeydown="if(event.key==='Enter'){event.preventDefault();quickAdd('location','step')}"/>
        <button type="button" class="quick-add-btn" onclick="quickAdd('location','step')">Add</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('stepModal')">Cancel</button>
      <button class="btn-save" onclick="saveStep()">Save</button>
    </div>
  </div>
</div>

<!-- COMPLETION MODAL -->
<div class="modal-overlay comp-modal" id="compModal">
  <div class="modal">
    <h2>All done! 🎉</h2>
    <p class="comp-sub" id="compSub"></p>
    <div class="comp-choices">
      <button class="comp-btn" onclick="markProjComplete()">Project Complete!<small>Archive this project as finished</small></button>
      <button class="comp-btn" onclick="addMoreSteps()">Add More Steps<small>Keep it open and add what comes next</small></button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->

<script>
const STATUSES = [
  {id:'timesensitive', label:'Time-Sensitive', desc:'Drop everything'},
  {id:'active',        label:'Active',         desc:'In progress'},
  {id:'todo',          label:'To Do',          desc:'Next up'},
  {id:'errands',       label:'Errands',        desc:'Out & about'},
  {id:'someday',       label:'Someday / Maybe',desc:'Back burner'},
  {id:'onhold',        label:'On Hold',        desc:'Paused'},
  {id:'waiting',       label:'Waiting On',     desc:'Their court'},
];

const STATUS_COLORS = {
  timesensitive:'#d94f4f', active:'#4a80b0', todo:'#6e9ec0',
  errands:'#7b9e87', someday:'#92bcd0', onhold:'#6a7e92', waiting:'#8a9aaa',
};

// ── STATE ────────────────────────────────────────────────────────────

let S = {
  tasks:     JSON.parse(localStorage.getItem('gyst_v6_tasks')  || '[]'),
  inbox:     JSON.parse(localStorage.getItem('gyst_v6_inbox')  || '[]'),
  projects:  JSON.parse(localStorage.getItem('gyst_projs')  || JSON.stringify([
    {id:'guardian', name:'Guardian Group', notes:'Safety consulting — Shield Program & onboarding',
     completed:false, dueDate:null, projStatus:'active', labels:[], created:Date.now(),
     steps:[
       {id:'sg1',title:'Finalize Shield Program pricing tiers',done:false,dueDate:null,statusOverride:null,labels:[],location:null},
       {id:'sg2',title:'Draft onboarding package outline',     done:false,dueDate:null,statusOverride:null,labels:[],location:null},
       {id:'sg3',title:'Build fatality support protocol doc',  done:false,dueDate:null,statusOverride:null,labels:[],location:null},
     ]},
    {id:'ascend', name:'ASCEND', notes:'501(c)3 — aviation & skydiving career nonprofit',
     completed:false, dueDate:null, projStatus:'active', labels:[], created:Date.now(),
     steps:[
       {id:'sa1',title:'Set up board structure and roles',    done:false,dueDate:null,statusOverride:null,labels:[],location:null},
       {id:'sa2',title:'Update website with 501(c)3 status',  done:false,dueDate:null,statusOverride:null,labels:[],location:null},
       {id:'sa3',title:'Draft first donor outreach email',    done:false,dueDate:null,statusOverride:null,labels:[],location:null},
     ]},
    {id:'personal', name:'Personal', notes:'',
     completed:false, dueDate:null, projStatus:'active', labels:[], created:Date.now(),
     steps:[
       {id:'sp1',title:'Schedule credit-by-exam study sessions',done:false,dueDate:null,statusOverride:null,labels:[],location:null},
     ]},
  ])),
  labels:    JSON.parse(localStorage.getItem('gyst_labels') || JSON.stringify(['Guardian Group','ASCEND','Personal'])),
  locations: JSON.parse(localStorage.getItem('gyst_locs')   || '[]'),
  view: 'all',
  activeProjId: null,
  editTaskId: null,
  editProjId: null,
  editStepProjId: null,
  editStepId: null,
  compProjId: null,
  gyst: {items:[], index:0},
  // Temp picker state for current modal session
  tLabels: [], tLoc: [], pLabels: [], sLoc: [],
};

function persist() {
  localStorage.setItem('gyst_v6_tasks',  JSON.stringify(S.tasks));
  localStorage.setItem('gyst_v6_inbox',  JSON.stringify(S.inbox));
  localStorage.setItem('gyst_projs',  JSON.stringify(S.projects));
  localStorage.setItem('gyst_labels', JSON.stringify(S.labels));
  localStorage.setItem('gyst_locs',   JSON.stringify(S.locations));
}
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── DUE DATE ─────────────────────────────────────────────────────────

function within48(d) {
  if (!d) return false;
  const diff = new Date(d+'T23:59:59') - new Date();
  return diff >= 0 && diff <= 172800000;
}
function overdue(d)  { return d ? new Date(d+'T23:59:59') < new Date() : false; }
function dueSoon(d)  { return within48(d) || overdue(d); }

function fmtDue(d, cls) {
  cls = cls || 'ac-date';
  if (!d) return '';
  const lbl = new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if (overdue(d))  return '<span class="'+cls+' soon">Overdue · '+lbl+'</span>';
  if (within48(d)) return '<span class="'+cls+' soon">Due '+lbl+'</span>';
  return '<span class="'+cls+'">Due '+lbl+'</span>';
}

function effectiveTaskStatus(t) {
  if (!t.done && dueSoon(t.dueDate)) return 'timesensitive';
  return t.status;
}

function effectiveStepDue(step, proj) {
  return step.dueDate || proj.dueDate || null;
}

// ── PROJECT HELPERS ───────────────────────────────────────────────────

function nextStep(proj) {
  return proj.steps.find(function(s){ return !s.done && s.statusOverride !== 'onhold'; }) || null;
}

function progress(proj) {
  if (!proj.steps.length) return {done:0, total:0, pct:0};
  var d = proj.steps.filter(function(s){ return s.done; }).length;
  return {done:d, total:proj.steps.length, pct:Math.round(d/proj.steps.length*100)};
}

function stepStatus(step, isNext, proj) {
  var due = effectiveStepDue(step, proj);
  if (dueSoon(due)) return 'timesensitive';
  if (isNext) return 'active';
  return 'todo';
}

// ── SIDEBAR UTILS ─────────────────────────────────────────────────────

var activeLabels    = [];
var activeLocations = [];

function toggleSBSection(bodyId, chevronId) {
  var body    = document.getElementById(bodyId);
  var chevron = document.getElementById(chevronId);
  if (!body) return;
  body.classList.toggle('hidden');
  if (chevron) chevron.classList.toggle('collapsed');
}

function renderLabelFilter() {
  var list  = document.getElementById('labelFilterList');
  var clear = document.getElementById('labelFilterClear');
  if (!list) return;
  list.innerHTML = '';
  if (!S.labels.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-style:italic;padding:4px 10px">No labels yet</div>';
    if (clear) clear.classList.remove('show');
    return;
  }
  S.labels.forEach(function(lbl) {
    var btn = document.createElement('button');
    btn.className = 'sb-label-chip' + (activeLabels.indexOf(lbl) > -1 ? ' sel' : '');
    btn.innerHTML = '<div class="sb-label-dot"></div>' + esc(lbl);
    btn.onclick = function() {
      var idx = activeLabels.indexOf(lbl);
      if (idx > -1) activeLabels.splice(idx, 1);
      else activeLabels.push(lbl);
      renderLabelFilter();
      renderMain();
    };
    list.appendChild(btn);
  });
  if (clear) clear.classList.toggle('show', activeLabels.length > 0);
}

function clearLabelFilter() {
  activeLabels = [];
  renderLabelFilter();
  renderMain();
}

function itemMatchesLabels(item) {
  if (!activeLabels.length) return true;
  var itemLabels = item.labels || [];
  return activeLabels.every(function(l){ return itemLabels.indexOf(l) > -1; });
}

function renderLocFilter() {
  var list  = document.getElementById('locFilterList');
  var clear = document.getElementById('locFilterClear');
  if (!list) return;
  list.innerHTML = '';
  if (!S.locations.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-style:italic;padding:4px 10px">No locations yet</div>';
    if (clear) clear.classList.remove('show');
    return;
  }
  S.locations.forEach(function(loc) {
    var btn = document.createElement('button');
    btn.className = 'sb-label-chip' + (activeLocations.indexOf(loc) > -1 ? ' sel' : '');
    btn.innerHTML = '<div class="sb-label-dot"></div>' + esc(loc);
    btn.onclick = function() {
      var idx = activeLocations.indexOf(loc);
      if (idx > -1) activeLocations.splice(idx, 1);
      else activeLocations.push(loc);
      renderLocFilter();
      renderMain();
    };
    list.appendChild(btn);
  });
  if (clear) clear.classList.toggle('show', activeLocations.length > 0);
}

function clearLocFilter() {
  activeLocations = [];
  renderLocFilter();
  renderMain();
}

function itemMatchesLocations(item) {
  if (!activeLocations.length) return true;
  return activeLocations.indexOf(item.location || null) > -1;
}

// ── RENDER ───────────────────────────────────────────────────────────

function renderAll() { renderSidebar(); renderMain(); updateCaptureBadge(); }

function renderSidebar() {
  // View counts
  var tasksDone   = S.tasks.filter(function(t){ return !t.done; });
  var stepsDone   = S.projects.filter(function(p){ return !p.completed; }).reduce(function(n,p){
    return n + p.steps.filter(function(s){ return !s.done; }).length;
  }, 0);
  var allCount    = tasksDone.length + stepsDone;
  var projectCount = S.projects.filter(function(p){ return !p.completed; }).length;
  var errandCount  = S.tasks.filter(function(t){ return !t.done && t.status === 'errands'; }).length;

  var cntAll = document.getElementById('cnt-all');
  var cntProj = document.getElementById('cnt-projects');
  var cntErr  = document.getElementById('cnt-errands');
  if (cntAll)  cntAll.textContent  = allCount     || '';
  if (cntProj) cntProj.textContent = projectCount || '';
  if (cntErr)  cntErr.textContent  = errandCount  || '';

  // Project list
  var list = document.getElementById('projectList');
  if (list) {
    list.innerHTML = '';
    S.projects.filter(function(p){ return !p.completed; }).forEach(function(p) {
      var pg  = progress(p);
      var btn = document.createElement('button');
      var isActive = S.view === 'project' && S.activeProjId === p.id;
      btn.className = 'sb-btn' + (isActive ? ' active' : '');
      btn.innerHTML = '<div class="sb-btn-inner"><span class="sb-name">'+esc(p.name)+'</span></div>'
        + (pg.total ? '<span class="sb-count">'+pg.done+'/'+pg.total+'</span>' : '');
      btn.onclick = (function(proj, b) {
        return function() {
          S.activeProjId = proj.id;
          S.view = 'project';
          document.querySelectorAll('#vb-all,#vb-projects,#vb-errands').forEach(function(x){ x.classList.remove('active'); });
          document.querySelectorAll('#projectList .sb-btn').forEach(function(x){ x.classList.remove('active'); });
          b.classList.add('active');
          renderMain();
        };
      }(p, btn));
      list.appendChild(btn);
    });
  }

  // Label filter
  renderLabelFilter();
  // Location filter
  renderLocFilter();
}

function renderMain() {
  var c = document.getElementById('mainContent');
  if      (S.view === 'projects') renderProjectsView(c);
  else if (S.view === 'errands')  renderErrandsView(c);
  else if (S.view === 'project')  renderSingleProjectView(c);
  else                            renderTasksView(c);
}

function setView(v, btn) {
  S.view = v;
  document.querySelectorAll('#vb-all,#vb-projects,#vb-errands').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('#projectList .sb-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderSidebar();
  renderMain();
}

// ── TASKS VIEW ────────────────────────────────────────────────────────

function renderTasksView(c) {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  c.innerHTML = '';
  var buckets = {};
  STATUSES.forEach(function(s){ buckets[s.id] = []; });

  S.tasks.forEach(function(t) {
    if (q && !t.title.toLowerCase().includes(q) && !(t.notes||'').toLowerCase().includes(q)) return;
    if (!itemMatchesLabels(t)) return;
    if (!itemMatchesLocations(t)) return;
    var st = effectiveTaskStatus(t);
    if (buckets[st]) buckets[st].push({type:'task', item:t});
  });

  S.projects.filter(function(p){ return !p.completed && (!p.projStatus || p.projStatus === 'active'); }).forEach(function(p) {
    var ns = nextStep(p);
    p.steps.forEach(function(s) {
      if (s.done || s.statusOverride === 'onhold') return;
      if (q && !s.title.toLowerCase().includes(q) && !p.name.toLowerCase().includes(q)) return;
      var isNext = ns && ns.id === s.id;
      var st = stepStatus(s, isNext, p);
      if (buckets[st]) buckets[st].push({type:'step', item:s, proj:p, isNext:isNext});
    });
  });

  var wrap = document.createElement('div');
  wrap.className = 'status-groups';

  STATUSES.forEach(function(st) {
    var items = buckets[st.id] || [];
    var collapsed = st.id === 'onhold' || st.id === 'waiting' || st.id === 'someday';
    var grp = document.createElement('div');
    grp.className = 'status-group s-' + st.id;
    var active = items.filter(function(i){ return !(i.type === 'task' && i.item.done); });
    var done   = items.filter(function(i){ return i.type === 'task' && i.item.done; });
    var all    = active.concat(done);
    var bodyHTML = all.length === 0
      ? '<div class="empty-state">Nothing here — enjoy the quiet.</div>'
      : all.map(function(i){ return i.type === 'task' ? taskCardHTML(i.item) : stepCardHTML(i.item, i.proj, i.isNext); }).join('');
    grp.innerHTML = '<div class="sg-header" onclick="toggleSG(this)">'
      + '<div class="sg-left"><div class="sg-dot"></div><span class="sg-name">'+st.label+'</span><span class="sg-desc">— '+st.desc+'</span></div>'
      + '<div class="sg-right"><span class="sg-badge">'+all.length+'</span><span class="sg-toggle'+(collapsed?' collapsed':'')+'">▼</span></div>'
      + '</div>'
      + '<div class="sg-body'+(collapsed?' hidden':'')+'">'+bodyHTML+'</div>';
    wrap.appendChild(grp);
  });

  c.appendChild(wrap);
}

function taskCardHTML(t) {
  var autoEsc = !t.done && effectiveTaskStatus(t) === 'timesensitive' && t.status !== 'timesensitive';
  return '<div class="action-card'+(t.done?' is-done':'')+'">'
    + '<div class="ac-check'+(t.done?' chk':'')+'" onclick="toggleTask(\''+t.id+'\')"></div>'
    + '<div class="ac-body ac-body-click" onclick="openEditTask(\''+t.id+'\')">'
    + '<div class="ac-title">'+esc(t.title)+(autoEsc?'<span class="badge-esc">auto-escalated</span>':'')+'</div>'
    + (t.notes ? '<div class="ac-notes">'+esc(t.notes)+'</div>' : '')
    + '<div class="ac-meta">'+(t.dueDate ? fmtDue(t.dueDate) : '')+'</div>'
    + '</div>'
    + '<div class="ac-actions">'
    + '<button class="ic-btn del" onclick="delTask(\''+t.id+'\')">✕</button>'
    + '</div></div>';
}

function stepCardHTML(step, proj, isNext) {
  var due = effectiveStepDue(step, proj);
  return '<div class="action-card">'
    + '<div class="ac-check" onclick="toggleStep(\''+proj.id+'\',\''+step.id+'\')"></div>'
    + '<div class="ac-body ac-body-click" onclick="openEditStep(\''+proj.id+'\',\''+step.id+'\')">'
    + '<div class="ac-title">'+esc(step.title)+'</div>'
    + '<div class="ac-meta">'
    + '<span class="proj-tag">'+esc(proj.name)+'</span>'
    + (isNext ? '<span class="next-tag">Next Action</span>' : '')
    + (due ? fmtDue(due) : '')
    + '</div></div>'
    + '<div class="ac-actions">'
    + '<button class="ic-btn del" onclick="delStep(\''+proj.id+'\',\''+step.id+'\')">✕</button>'
    + '</div>'
    + '</div>';
}

function toggleSG(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('.sg-toggle');
  body.classList.toggle('hidden');
  arrow.classList.toggle('collapsed');
}

// ── ERRANDS VIEW ─────────────────────────────────────────────────────

function renderErrandsView(c) {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  c.innerHTML = '';

  var tasks = S.tasks.filter(function(t) {
    if (t.status !== 'errands') return false;
    if (q && !t.title.toLowerCase().includes(q) && !(t.notes||'').toLowerCase().includes(q)) return false;
    if (!itemMatchesLabels(t)) return false;
    if (!itemMatchesLocations(t)) return false;
    return true;
  });

  if (!tasks.length) {
    c.innerHTML = '<div class="empty-state">No errands — enjoy the freedom. 🛒</div>';
    return;
  }

  var byLoc = {};
  tasks.forEach(function(t) {
    var key = t.location || '__none__';
    if (!byLoc[key]) byLoc[key] = [];
    byLoc[key].push(t);
  });

  var wrap = document.createElement('div');
  wrap.className = 'status-groups';

  var keys = Object.keys(byLoc).filter(function(k){ return k !== '__none__'; }).sort();
  if (byLoc['__none__']) keys.push('__none__');

  keys.forEach(function(key) {
    var items = byLoc[key];
    var label = key === '__none__' ? 'No Location' : key;
    var active = items.filter(function(t){ return !t.done; });
    var done   = items.filter(function(t){ return t.done; });
    var all    = active.concat(done);
    var grp = document.createElement('div');
    grp.className = 'status-group s-errands';
    grp.innerHTML = '<div class="sg-header" onclick="toggleSG(this)">'
      + '<div class="sg-left"><div class="sg-dot"></div><span class="sg-name">'+esc(label)+'</span><span class="sg-desc">— '+all.length+' errand'+(all.length!==1?'s':'')+'</span></div>'
      + '<div class="sg-right"><span class="sg-badge">'+all.length+'</span><span class="sg-toggle">▼</span></div>'
      + '</div>'
      + '<div class="sg-body">'+all.map(function(t){ return taskCardHTML(t); }).join('')+'</div>';
    wrap.appendChild(grp);
  });

  c.appendChild(wrap);
}

// ── PROJECTS VIEW ─────────────────────────────────────────────────────

function renderProjectsView(c) {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  c.innerHTML = '';

  var projs = S.projects.filter(function(p) {
    if (q && !p.name.toLowerCase().includes(q) && !p.steps.some(function(s){ return s.title.toLowerCase().includes(q); })) return false;
    return true;
  });

  if (!projs.length) {
    c.innerHTML = '<div class="empty-state">No projects yet. Hit + New Project to get started.</div>';
    return;
  }

  var statusColors = {active:'var(--active)', someday:'var(--someday)', onhold:'var(--onhold)'};
  var groups = [
    {key:'active',    label:'Active',         color:'var(--active)',   list:projs.filter(function(p){ return !p.completed && (!p.projStatus || p.projStatus==='active'); })},
    {key:'someday',   label:'Someday / Maybe', color:'var(--someday)',  list:projs.filter(function(p){ return !p.completed && p.projStatus==='someday'; })},
    {key:'onhold',    label:'On Hold',         color:'var(--onhold)',   list:projs.filter(function(p){ return !p.completed && p.projStatus==='onhold'; })},
    {key:'completed', label:'Completed',       color:'var(--text-dim)', list:projs.filter(function(p){ return p.completed; })},
  ];

  var grid = document.createElement('div');
  grid.className = 'projects-grid';

  groups.forEach(function(g) {
    if (!g.list.length) return;
    var section = document.createElement('div');
    section.className = 'proj-section';
    section.innerHTML = '<div class="proj-section-header">'
      + '<div class="proj-section-dot" style="background:'+g.color+'"></div>'
      + '<span class="proj-section-label" style="color:'+g.color+'">'+g.label+'</span>'
      + '<span class="proj-section-count">'+g.list.length+' project'+(g.list.length!==1?'s':'')+'</span>'
      + '</div>';
    var inner = document.createElement('div');
    inner.className = 'projects-grid';
    g.list.forEach(function(p){ inner.appendChild(buildProjCard(p, false)); });
    section.appendChild(inner);
    grid.appendChild(section);
  });

  c.appendChild(grid);
}

// ── SINGLE PROJECT VIEW ───────────────────────────────────────────────

function renderSingleProjectView(c) {
  c.innerHTML = '';
  var proj = S.projects.find(function(p){ return p.id === S.activeProjId; });
  if (!proj) { c.innerHTML = '<div class="empty-state">Project not found.</div>'; return; }
  var wrap = document.createElement('div');
  wrap.className = 'projects-grid';
  wrap.appendChild(buildProjCard(proj, true));
  c.appendChild(wrap);
}

// ── BUILD PROJECT CARD ────────────────────────────────────────────────

function buildProjCard(p, alwaysOpen) {
  var pg  = progress(p);
  var ns  = nextStep(p);
  var card = document.createElement('div');
  card.className = 'proj-card' + (p.completed ? ' completed' : '');
  card.id = 'pc-' + p.id;

  var borderColor = p.completed ? 'var(--someday)'
    : (p.projStatus === 'someday' ? 'var(--someday)'
    : (p.projStatus === 'onhold'  ? 'var(--onhold)'
    : 'var(--accent)'));

  var urgent  = ns && dueSoon(effectiveStepDue(ns, p));
  var nextHtml = ns
    ? '<span class="next-lbl'+(urgent?' urgent':'')+'">'+( urgent?'Urgent':'Next Action')+'</span> '+esc(ns.title)+(effectiveStepDue(ns,p) ? ' &nbsp;'+fmtDue(effectiveStepDue(ns,p),'step-due') : '')
    : p.completed
      ? '<span style="color:var(--text-dim);font-style:italic">All steps complete</span>'
      : '<span style="color:var(--text-dim);font-style:italic">No steps yet'+(alwaysOpen ? '' : ' — expand to add one')+'</span>';

  var projDueFmt = p.dueDate
    ? '<span class="proj-due-badge '+(dueSoon(p.dueDate)?'soon':'ok')+'">Due '
      + new Date(p.dueDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span>'
    : '';

  var projStatusBadge = (p.projStatus && p.projStatus !== 'active')
    ? '<span class="proj-due-badge ok" style="color:'+borderColor+';border-color:'+borderColor+';background:transparent">'+(p.projStatus==='someday'?'Someday / Maybe':'On Hold')+'</span>'
    : '';

  var expandBtn = alwaysOpen ? ''
    : '<button class="expand-btn" id="eb-'+p.id+'" onclick="toggleProjSteps(\''+p.id+'\')">▼</button>';

  var stepsRows = p.steps.map(function(s, i) {
    return buildStepRow(p.id, s, i, ns && ns.id === s.id, p);
  }).join('');

  card.innerHTML = '<div class="proj-card-header" style="border-left-color:'+borderColor+'">'
    + expandBtn
    + '<div class="proj-info">'
    + '<div class="proj-name">'+esc(p.name)+(p.completed?'<span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:8px">complete</span>':'')+'</div>'
    + '<div class="proj-next">'+nextHtml+'</div>'
    + '</div>'
    + '<div class="proj-meta">'
    + projStatusBadge + projDueFmt
    + (pg.total ? '<div class="prog-wrap"><div class="prog-fill" style="width:'+pg.pct+'%;background:'+borderColor+'"></div></div><span class="prog-text">'+pg.done+'/'+pg.total+'</span>' : '')
    + '<button class="ic-btn" onclick="openEditProj(\''+p.id+'\')">✎</button>'
    + '<button class="ic-btn del" onclick="delProj(\''+p.id+'\')">✕</button>'
    + '</div></div>'
    + '<div class="steps-panel'+(alwaysOpen?' open':'')+'" id="sp-'+p.id+'">'
    + stepsRows
    + '<div class="add-step-row">'
    + '<input class="add-step-input" id="asi-'+p.id+'" type="text" placeholder="Add action step…" onkeydown="if(event.key===\'Enter\')addStep(\''+p.id+'\')">'
    + '<button class="add-step-go" onclick="addStep(\''+p.id+'\')">Add</button>'
    + '</div></div>';

  return card;
}

function toggleProjSteps(pid) {
  var panel = document.getElementById('sp-'+pid);
  var btn   = document.getElementById('eb-'+pid);
  if (!panel) return;
  var open = panel.classList.toggle('open');
  if (btn) btn.textContent = open ? '▲' : '▼';
}

function buildStepRow(pid, step, idx, isNext, proj) {
  var due = effectiveStepDue(step, proj);
  var manualHold = step.statusOverride === 'onhold';
  var st = manualHold ? 'onhold' : stepStatus(step, isNext, proj);
  var badge = '';
  if (!step.done) {
    if      (st === 'timesensitive')  badge = '<span class="sbadge urgent">Time-Sensitive</span>';
    else if (st === 'onhold')         badge = '<span class="sbadge hold">On Hold</span>';
    else if (isNext && !manualHold)   badge = '<span class="sbadge next">Next Action</span>';
    else if (!manualHold)             badge = '<span class="sbadge todo">To Do</span>';
  }
  var inherited = (!step.dueDate && proj.dueDate) ? '<span style="font-size:10px;color:var(--text-dim)">(project due)</span>' : '';
  return '<div class="step-row'+(step.done?' done-step':'')+(isNext&&!step.done&&!manualHold?' is-next':'')+(manualHold?' on-hold-step':'')+'" id="sr-'+step.id+'">'
    + '<span class="step-num">'+(idx+1)+'.</span>'
    + '<div class="step-chk'+(step.done?' chk':'')+'" onclick="toggleStep(\''+pid+'\',\''+step.id+'\')"></div>'
    + '<div class="step-body">'
    + '<div class="step-title">'+esc(step.title)+'</div>'
    + '<div class="step-badges">'+badge+(due?fmtDue(due,'step-due'):'')+inherited+'</div>'
    + '</div>'
    + '<div class="step-acts">'
    + '<button class="step-btn" onclick="openEditStep(\''+pid+'\',\''+step.id+'\')">✎</button>'
    + '<button class="step-btn del" onclick="delStep(\''+pid+'\',\''+step.id+'\')">✕</button>'
    + '</div></div>';
}

// ── ACTIONS ───────────────────────────────────────────────────────────

function toggleTask(id) {
  var t = S.tasks.find(function(t){ return t.id === id; });
  if (!t) return;
  t.done = !t.done;
  persist(); renderAll();
}

function delTask(id) {
  if (!confirm('Delete this task?')) return;
  S.tasks = S.tasks.filter(function(t){ return t.id !== id; });
  persist(); renderAll();
}

function toggleStep(pid, sid) {
  var proj = S.projects.find(function(p){ return p.id === pid; });
  if (!proj) return;
  var step = proj.steps.find(function(s){ return s.id === sid; });
  if (!step) return;
  step.done = !step.done;
  persist();
  if (step.done && proj.steps.every(function(s){ return s.done; })) {
    S.compProjId = pid;
    document.getElementById('compSub').textContent = 'Every step in "'+proj.name+'" is complete.';
    openModal('compModal');
  } else {
    renderAll();
  }
}

function addStep(pid) {
  var inp   = document.getElementById('asi-'+pid);
  var title = inp && inp.value.trim();
  if (!title) return;
  var proj = S.projects.find(function(p){ return p.id === pid; });
  if (!proj) return;
  proj.steps.push({id:uid(), title:title, done:false, dueDate:null, statusOverride:null, labels:[], location:null});
  persist(); renderAll();
  setTimeout(function() {
    var ni = document.getElementById('asi-'+pid);
    if (ni) { ni.value = ''; ni.focus(); }
  }, 60);
}

function delStep(pid, sid) {
  if (!confirm('Delete this step?')) return;
  var proj = S.projects.find(function(p){ return p.id === pid; });
  if (proj) proj.steps = proj.steps.filter(function(s){ return s.id !== sid; });
  persist(); renderAll();
}

function delProj(pid) {
  if (!confirm('Delete this entire project and all its steps?')) return;
  S.projects = S.projects.filter(function(p){ return p.id !== pid; });
  persist(); renderAll();
}

function markProjComplete() {
  var proj = S.projects.find(function(p){ return p.id === S.compProjId; });
  if (proj) proj.completed = true;
  persist(); closeModal('compModal'); renderAll();
}

function addMoreSteps() {
  closeModal('compModal');
  S.activeProjId = S.compProjId;
  S.view = 'project';
  document.querySelectorAll('#vb-all,#vb-projects,#vb-errands').forEach(function(b){ b.classList.remove('active'); });
  renderAll();
  setTimeout(function() {
    var inp = document.getElementById('asi-'+S.compProjId);
    if (inp) inp.focus();
  }, 200);
}

// ── PICKERS ───────────────────────────────────────────────────────────

function setPSel(rowId, attr, btn) {
  document.querySelectorAll('#'+rowId+' .pso').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
}

function getPSel(rowId, attr) {
  var sel = document.querySelector('#'+rowId+' .pso.sel');
  return sel ? sel.dataset[attr] : null;
}

function buildStatusGrid(selectedId) {
  var grid = document.getElementById('statusGrid');
  grid.innerHTML = '';
  STATUSES.forEach(function(st) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'so' + (st.id === selectedId ? ' sel' : '');
    btn.dataset.s = st.id;
    btn.textContent = st.label;
    btn.onclick = function() {
      document.querySelectorAll('#statusGrid .so').forEach(function(b){ b.classList.remove('sel'); });
      btn.classList.add('sel');
    };
    grid.appendChild(btn);
  });
}

// ── TAG PICKERS ───────────────────────────────────────────────────────

function renderTagPicker(containerId, type, selectedArr) {
  var c    = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  var pool = type === 'label' ? S.labels : S.locations;
  if (!pool.length) {
    c.innerHTML = '<span class="tag-empty">No '+type+'s yet — add one below</span>';
    return;
  }
  pool.forEach(function(item) {
    var chip = document.createElement('div');
    var isSel = selectedArr.indexOf(item) > -1;
    chip.className = 'tag-chip ' + (type === 'label' ? 'lbl' : 'loc') + (isSel ? ' sel' : '');
    chip.textContent = item;
    chip.onclick = function() {
      if (type === 'label') {
        var idx = selectedArr.indexOf(item);
        if (idx > -1) selectedArr.splice(idx, 1);
        else selectedArr.push(item);
      } else {
        if (selectedArr.indexOf(item) > -1) { selectedArr.length = 0; }
        else { selectedArr.length = 0; selectedArr.push(item); }
      }
      renderTagPicker(containerId, type, selectedArr);
    };
    c.appendChild(chip);
  });
}

function quickAdd(type, ctx) {
  var inpId = ctx === 'task' ? (type === 'label' ? 'tNewLabel' : 'tNewLoc')
            : ctx === 'project' ? 'pNewLabel'
            : 'sNewLoc';
  var pickerMap = {
    'label-task':    {picker:'tLabelPicker',  arr:'tLabels'},
    'location-task': {picker:'tLocPicker',    arr:'tLoc'},
    'label-project': {picker:'pLabelPicker',  arr:'pLabels'},
    'location-step': {picker:'sLocPicker',    arr:'sLoc'},
  };
  var key  = type + '-' + ctx;
  var info = pickerMap[key];
  if (!info) return;
  var inp  = document.getElementById(inpId);
  var val  = inp && inp.value.trim();
  if (!val) return;
  var pool = type === 'label' ? S.labels : S.locations;
  if (pool.indexOf(val) === -1) { pool.push(val); persist(); }
  var arr  = S[info.arr];
  if (arr.indexOf(val) === -1) arr.push(val);
  if (inp) inp.value = '';
  renderTagPicker(info.picker, type, arr);
}
